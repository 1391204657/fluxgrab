# Deploy static website to GitHub Pages (GitHub Actions source).
# Also publishes gh-pages branch as fallback (Settings → Deploy from branch → gh-pages).

name: Deploy website

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare static site
        run: |
          mkdir -p _site
          cp -r assets guides _site/
          cp *.html _site/
          cp CNAME .nojekyll robots.txt sitemap.xml _site/

      - name: Publish gh-pages branch (fallback)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          force_orphan: true

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
        continue-on-error: true
        with:
          timeout: 900000
          error_count: 15
          reporting_interval: 10000

      - name: Wait before retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 60

      - uses: actions/deploy-pages@v4
        id: deployment-retry
        if: steps.deployment.outcome == 'failure'
        with:
          timeout: 900000
          error_count: 15
          reporting_interval: 10000
